# Web console (Flask + HTMX) for admin to triage incidents and confirm
# Layer-2 follow-up actions. Talks to incident-service over the cluster
# Service DNS using a server-side admin RBAC token.
---
apiVersion: v1
kind: Secret
metadata:
  name: web-console-secrets
  namespace: soc
type: Opaque
stringData:
  ADMIN_USERNAME: "admin"
  ADMIN_PASSWORD: "ztsoc-demo"
  RBAC_ADMIN_TOKEN: "admin-demo-token"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-console
  namespace: soc
  labels:
    app.kubernetes.io/name: web-console
    app.kubernetes.io/part-of: zero-trust-mapper
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: web-console }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: web-console
    spec:
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["userver-worker-home"]
      containers:
        - name: web-console
          image: johnnaeder/zt-web-console:v0.2
          imagePullPolicy: IfNotPresent
          env:
            - name: INCIDENT_API_URL
              value: "http://zt-incident-service.soc.svc.cluster.local:8080"
          envFrom:
            - secretRef: { name: web-console-secrets }
          ports:
            - { containerPort: 5000, name: http }
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 96Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
          volumeMounts:
            - { name: tmp, mountPath: /tmp }
      volumes:
        - name: tmp
          emptyDir: { sizeLimit: 32Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: web-console
  namespace: soc
  labels:
    app.kubernetes.io/name: web-console
spec:
  selector: { app.kubernetes.io/name: web-console }
  ports:
    - { name: http, port: 5000, targetPort: http }
  type: ClusterIP
