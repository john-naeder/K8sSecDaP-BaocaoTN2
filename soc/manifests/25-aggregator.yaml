apiVersion: v1
kind: Namespace
metadata:
  name: soc
  labels:
    # PSA `baseline` instead of `restricted`: postgres:16-alpine and
    # the nats StatefulSet ship default container securityContexts that
    # PSA restricted rejects (allowPrivilegeEscalation, capabilities,
    # runAsNonRoot, seccompProfile). Relaxing the floor lets the
    # stateful images run while the Go services in this namespace
    # (incident-service, aggregator, web-console) keep their own
    # tighter per-pod securityContext where they have one.
    pod-security.kubernetes.io/enforce: baseline
    app.kubernetes.io/part-of: zero-trust-mapper
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: zt-aggregator
  namespace: soc
  labels:
    app.kubernetes.io/name: zt-aggregator
    app.kubernetes.io/component: aggregator
spec:
  replicas: 1                    # active-passive via NATS queue group; scale to 2 for HA
  selector:
    matchLabels:
      app.kubernetes.io/name: zt-aggregator
  template:
    metadata:
      labels:
        app.kubernetes.io/name: zt-aggregator
        app.kubernetes.io/component: aggregator
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: aggregator
          image: johnnaeder/ebpf-portscan-k8s-check:aggregator-s2-r2
          imagePullPolicy: IfNotPresent
          env:
            - name: NATS_URL
              value: "nats://nats.soc.svc.cluster.local:4222"
            - name: SUBJECT_IN
              value: "zt.alerts.raw"
            - name: SUBJECT_OUT
              value: "zt.alerts.enriched"
            - name: WINDOW_SECS
              value: "60"
          ports:
            - { containerPort: 9100, name: http }
          readinessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: http }
            periodSeconds: 30
            initialDelaySeconds: 10
          resources:
            requests: { cpu: 50m,  memory: 64Mi }
            limits:   { cpu: 500m, memory: 256Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: zt-aggregator
  namespace: soc
  labels:
    app.kubernetes.io/name: zt-aggregator
spec:
  selector:
    app.kubernetes.io/name: zt-aggregator
  ports:
    - { name: http, port: 9100, targetPort: http }
