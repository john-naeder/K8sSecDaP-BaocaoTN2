apiVersion: v1
kind: Namespace
metadata:
  name: zt-mapper
  labels:
    # zt-pipeline-live needs NET_ADMIN + NET_RAW capabilities and
    # hostNetwork=true for the eBPF kprobe + raw-socket alert bridge.
    # baseline rejects both, so this ns runs at privileged for the
    # collector DaemonSets only. Other namespaces (soc, zt-targets)
    # stay at baseline.
    pod-security.kubernetes.io/enforce: privileged
    app.kubernetes.io/part-of: zero-trust-mapper
