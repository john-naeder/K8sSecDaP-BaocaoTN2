# Postgres for soc-incident-service.
# Single replica StatefulSet with PVC; fine for the project demo.
---
apiVersion: v1
kind: Secret
metadata:
  name: postgres-creds
  namespace: soc
type: Opaque
stringData:
  POSTGRES_USER: soc
  POSTGRES_PASSWORD: soc-demo-password
  POSTGRES_DB: soc
---
apiVersion: v1
kind: Service
metadata:
  name: postgres
  namespace: soc
spec:
  selector: { app: postgres }
  ports:
    - { name: pg, port: 5432, targetPort: 5432 }
---
apiVersion: v1
kind: Service
metadata:
  name: postgres-headless
  namespace: soc
spec:
  clusterIP: None
  selector: { app: postgres }
  ports: [ { name: pg, port: 5432, targetPort: 5432 } ]
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: soc
spec:
  serviceName: postgres-headless
  replicas: 1
  selector: { matchLabels: { app: postgres } }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          envFrom:
            - secretRef: { name: postgres-creds }
          ports:
            - { containerPort: 5432, name: pg }
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data, subPath: pgdata }
          readinessProbe:
            exec:
              command: ["sh", "-c", "pg_isready -U $POSTGRES_USER -d $POSTGRES_DB -h 127.0.0.1"]
            periodSeconds: 5
            initialDelaySeconds: 5
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits:   { cpu: 1,    memory: 1Gi }
  volumeClaimTemplates:
    - metadata: { name: data }
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests: { storage: 5Gi }
