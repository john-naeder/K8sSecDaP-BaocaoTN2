# MailHog: in-cluster SMTP sink + web inbox.
# - SMTP listener on :1025 — incident-service drops mails here.
# - Web UI on :8025 — port-forward then open http://localhost:8025 to read.
# Demo-grade, no persistence, single replica.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mailhog
  namespace: soc
  labels:
    app.kubernetes.io/name: mailhog
    app.kubernetes.io/part-of: zero-trust-mapper
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: mailhog }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: mailhog
    spec:
      containers:
        - name: mailhog
          image: mailhog/mailhog:v1.0.1
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 1025, name: smtp }
            - { containerPort: 8025, name: ui }
          readinessProbe:
            tcpSocket: { port: smtp }
            periodSeconds: 5
          livenessProbe:
            tcpSocket: { port: smtp }
            periodSeconds: 30
          resources:
            requests: { cpu: 50m, memory: 64Mi }
            limits:   { cpu: 200m, memory: 128Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities: { drop: ["ALL"] }
            seccompProfile: { type: RuntimeDefault }
---
apiVersion: v1
kind: Service
metadata:
  name: mailhog
  namespace: soc
  labels:
    app.kubernetes.io/name: mailhog
spec:
  selector: { app.kubernetes.io/name: mailhog }
  ports:
    - { name: smtp, port: 1025, targetPort: smtp }
    - { name: ui,   port: 8025, targetPort: ui }
