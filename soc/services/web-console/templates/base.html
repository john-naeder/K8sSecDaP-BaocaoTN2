<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>{% block title %}ZT-SOC Console{% endblock %}</title>
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
  <style>
    body { font-family: -apple-system, Segoe UI, Helvetica, Arial, sans-serif; margin: 0; color: #222; }
    header { background: #2c3e50; color: #fff; padding: 12px 24px; }
    header h1 { margin: 0; font-size: 18px; }
    main { padding: 16px 24px; }
    table { border-collapse: collapse; width: 100%; margin-bottom: 24px; }
    th, td { padding: 8px 10px; border-bottom: 1px solid #ddd; text-align: left; font-size: 14px; }
    th { background: #ecf0f1; }
    .sev-critical { color: #c0392b; font-weight: 600; }
    .sev-high     { color: #d35400; font-weight: 600; }
    .sev-medium   { color: #2980b9; }
    .sev-low      { color: #7f8c8d; }
    .status-new      { color: #c0392b; }
    .status-pending  { color: #d35400; }
    .status-executed { color: #27ae60; }
    .status-rejected { color: #7f8c8d; }
    button { background: #2c3e50; color: #fff; border: 0; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 13px; }
    button.danger { background: #c0392b; }
    button.muted  { background: #7f8c8d; }
    a { color: #2980b9; }
    code { background: #f5f5f5; padding: 1px 5px; border-radius: 3px; font-size: 13px; }
    .error { background: #fde2e2; color: #c0392b; padding: 8px 12px; border-radius: 4px; }
    form.inline { display: inline; }
    form.followup { background: #f7f9fa; padding: 12px; border-radius: 6px; margin: 12px 0; }
    form.followup label { display: inline-block; width: 110px; font-size: 13px; }
    form.followup input, form.followup select { padding: 4px 8px; font-size: 13px; margin-bottom: 6px; }
  </style>
</head>
<body>
  <header>
    <h1>ZT-SOC Admin Console</h1>
    <nav style="margin-top: 6px;">
      <a href="/" style="color:#ecf0f1; margin-right: 16px;">Incidents</a>
      <a href="/reports" style="color:#ecf0f1;">Reports</a>
    </nav>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
</body>
</html>
