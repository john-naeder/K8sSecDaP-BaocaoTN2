# Lightweight CoreDNS instance authoritative for `zt.local`. Lives in its
# own namespace so it can't get tangled up with the cluster's kube-dns.
# Exposed via NodePort 30053 (UDP+TCP) so the workstation's systemd-resolved
# can point ~zt.local at 100.120.16.113:30053 (master Tailscale IP).
#
# A → service mapping: every entry resolves to the same Traefik NodePort
# (100.120.16.113), and Traefik decides routing by Host header — see
# platform/cloudflared/ingress/*-ingressroute.yaml.
---
apiVersion: v1
kind: Namespace
metadata:
  name: dns
  labels:
    app.kubernetes.io/part-of: networking
    pod-security.kubernetes.io/enforce: baseline
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: coredns-local
  namespace: dns
data:
  Corefile: |
    zt.local:53 {
        errors
        log
        hosts {
            100.120.16.113 argocd.zt.local
            100.120.16.113 grafana.zt.local
            100.120.16.113 console.zt.local
            100.120.16.113 uptime.zt.local
            100.120.16.113 traefik.zt.local
            100.120.16.113 prometheus.zt.local
            100.120.16.113 alertmanager.zt.local
            fallthrough
        }
        cache 30
    }
    # Catch-all so the resolver doesn't NXDOMAIN-loop other queries that
    # leak in through systemd-resolved's per-domain stub. Forward to
    # Cloudflare 1.1.1.1.
    .:53 {
        errors
        forward . 1.1.1.1 1.0.0.1
        cache 30
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coredns-local
  namespace: dns
  labels:
    app.kubernetes.io/name: coredns-local
    app.kubernetes.io/managed-by: zt-platform
spec:
  replicas: 1
  selector:
    matchLabels: { app.kubernetes.io/name: coredns-local }
  template:
    metadata:
      labels:
        app.kubernetes.io/name: coredns-local
    spec:
      # Pin to a control-plane-adjacent node so workstation reaching the
      # master NodePort always hits a Ready instance (worker-home flaps).
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: 100
              preference:
                matchExpressions:
                  - key: kubernetes.io/hostname
                    operator: NotIn
                    values: ["userver-worker-home"]
      containers:
        - name: coredns
          image: coredns/coredns:1.11.3
          args: ["-conf", "/etc/coredns/Corefile"]
          ports:
            - { containerPort: 53, name: dns,     protocol: UDP }
            - { containerPort: 53, name: dns-tcp, protocol: TCP }
          volumeMounts:
            - { name: config, mountPath: /etc/coredns, readOnly: true }
          resources:
            requests: { cpu: 25m, memory: 32Mi }
            limits:   { memory: 128Mi }
          securityContext:
            runAsNonRoot: true
            runAsUser: 65532
            allowPrivilegeEscalation: false
            # readOnlyRootFilesystem=true breaks the coredns image (binary
            # ends up not executable for the new UID under some runtimes);
            # keep RW but drop everything else.
            capabilities:
              drop: ["ALL"]
              add: ["NET_BIND_SERVICE"]
            seccompProfile: { type: RuntimeDefault }
      volumes:
        - name: config
          configMap: { name: coredns-local }
---
apiVersion: v1
kind: Service
metadata:
  name: coredns-local
  namespace: dns
  labels:
    app.kubernetes.io/name: coredns-local
spec:
  type: NodePort
  selector: { app.kubernetes.io/name: coredns-local }
  ports:
    - { name: dns,     protocol: UDP, port: 53, targetPort: dns,     nodePort: 30053 }
    - { name: dns-tcp, protocol: TCP, port: 53, targetPort: dns-tcp, nodePort: 30053 }
