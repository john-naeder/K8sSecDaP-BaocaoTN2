apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: uptime-kuma
  namespace: traefik
  labels:
    app.kubernetes.io/managed-by: zt-platform
spec:
  entryPoints: [web]
  routes:
    - match: Host(`uptime.zt.local`)
      kind: Rule
      services:
        - name: uptime-kuma
          namespace: monitoring
          port: 3001
