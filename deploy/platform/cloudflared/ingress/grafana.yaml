apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana
  namespace: traefik
  labels:
    app.kubernetes.io/managed-by: zt-platform
spec:
  entryPoints: [web]
  routes:
    - match: Host(`grafana.zt.local`)
      kind: Rule
      services:
        - name: kube-prometheus-grafana
          namespace: monitoring
          port: 80
