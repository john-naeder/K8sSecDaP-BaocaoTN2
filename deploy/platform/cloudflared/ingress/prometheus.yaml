apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: prometheus
  namespace: traefik
  labels:
    app.kubernetes.io/managed-by: zt-platform
spec:
  entryPoints: [web]
  routes:
    - match: Host(`prometheus.zt.local`)
      kind: Rule
      services:
        - name: kube-prometheus-kube-prome-prometheus
          namespace: monitoring
          port: 9090
    - match: Host(`alertmanager.zt.local`)
      kind: Rule
      services:
        - name: kube-prometheus-kube-prome-alertmanager
          namespace: monitoring
          port: 9093
