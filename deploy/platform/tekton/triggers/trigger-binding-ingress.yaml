apiVersion: triggers.tekton.dev/v1beta1
kind: TriggerBinding
metadata:
  name: github-push-ingress-binding
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: ingress-automation
spec:
  params:
    - name: git-repo-url
      value: $(body.repository.ssh_url)
    - name: git-revision
      value: $(body.after)
