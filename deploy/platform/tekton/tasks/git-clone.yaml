# git-clone Task — clone a Git repository into a workspace
# Based on Tekton Catalog git-clone v0.9
apiVersion: tekton.dev/v1
kind: Task
metadata:
  name: git-clone
  namespace: tekton-pipelines
  labels:
    app.kubernetes.io/part-of: slsa-pipeline
spec:
  description: >-
    Clone a Git repository into a shared workspace.
  params:
    - name: url
      description: Repository URL to clone
      type: string
    - name: revision
      description: Branch, tag, or commit SHA to checkout
      type: string
      default: "main"
    - name: subdirectory
      description: Subdirectory inside workspace to clone into
      type: string
      default: ""
    - name: deleteExisting
      description: Delete any existing contents before cloning
      type: string
      default: "true"
  results:
    - name: commit
      description: The precise commit SHA that was checked out
    - name: url
      description: The precise URL that was fetched
  workspaces:
    - name: output
      description: Workspace where the repo is cloned
    - name: ssh-directory
      optional: true
      description: SSH credentials for private repos
  steps:
    - name: clone
      image: alpine/git:2.47.2
      computeResources:
        requests:
          cpu: 100m
          memory: 96Mi
        limits:
          cpu: 300m
          memory: 256Mi
      env:
        - name: PARAM_URL
          value: $(params.url)
        - name: PARAM_REVISION
          value: $(params.revision)
        - name: PARAM_SUBDIRECTORY
          value: $(params.subdirectory)
        - name: PARAM_DELETE_EXISTING
          value: $(params.deleteExisting)
        - name: WORKSPACE_OUTPUT_PATH
          value: $(workspaces.output.path)
        - name: WORKSPACE_SSH_DIRECTORY_BOUND
          value: $(workspaces.ssh-directory.bound)
        - name: WORKSPACE_SSH_DIRECTORY_PATH
          value: $(workspaces.ssh-directory.path)
        - name: HOME
          value: /tmp/tekton-home
      script: |
        #!/usr/bin/env sh
        set -eu

        # Ensure HOME is writable
        mkdir -p "${HOME}"

        CHECKOUT_DIR="${WORKSPACE_OUTPUT_PATH}/${PARAM_SUBDIRECTORY}"

        if [ "${PARAM_DELETE_EXISTING}" = "true" ] && [ -d "${CHECKOUT_DIR}" ]; then
          rm -rf "${CHECKOUT_DIR:?}/"*
          rm -rf "${CHECKOUT_DIR}/."[!.]* 2>/dev/null || true
        fi

        # Setup SSH if provided — use GIT_SSH_COMMAND for explicit control
        if [ "${WORKSPACE_SSH_DIRECTORY_BOUND}" = "true" ]; then
          # Find private key
          SSH_KEY=""
          for f in "${WORKSPACE_SSH_DIRECTORY_PATH}"/id_*; do
            case "$f" in *.pub) continue ;; esac
            SSH_KEY="$f"
            break
          done

          if [ -n "${SSH_KEY}" ]; then
            # Copy key to writable location (SSH requires strict perms)
            mkdir -p "${HOME}/.ssh"
            cp -L "${SSH_KEY}" "${HOME}/.ssh/key"
            chmod 600 "${HOME}/.ssh/key"

            # known_hosts
            KNOWN_HOSTS_OPT="-o StrictHostKeyChecking=no"
            if [ -f "${WORKSPACE_SSH_DIRECTORY_PATH}/known_hosts" ]; then
              cp -L "${WORKSPACE_SSH_DIRECTORY_PATH}/known_hosts" "${HOME}/.ssh/known_hosts"
              KNOWN_HOSTS_OPT="-o UserKnownHostsFile=${HOME}/.ssh/known_hosts"
            fi

            export GIT_SSH_COMMAND="ssh -i ${HOME}/.ssh/key ${KNOWN_HOSTS_OPT} -o IdentitiesOnly=yes"
          fi
        fi

        git clone "${PARAM_URL}" "${CHECKOUT_DIR}"
        cd "${CHECKOUT_DIR}"
        git checkout "${PARAM_REVISION}"

        RESULT_SHA=$(git rev-parse HEAD)
        printf "%s" "${RESULT_SHA}" > "$(results.commit.path)"
        printf "%s" "${PARAM_URL}" > "$(results.url.path)"

        echo "Cloned ${PARAM_URL} @ ${RESULT_SHA}"
