# Loki + Promtail — aggregate pod stdout into Grafana-queryable storage.
# Monitoring app declares the Loki datasource so Grafana picks it up.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: logging
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    chart: loki-stack
    repoURL: https://grafana.github.io/helm-charts
    targetRevision: "2.10.2"
    helm:
      releaseName: loki
      valuesObject:
        loki:
          persistence: { enabled: true, size: 20Gi }
          resources:
            requests: { cpu: 150m, memory: 256Mi }
            limits:   { cpu: 1, memory: 1Gi }
        promtail:
          enabled: true
          resources:
            requests: { cpu: 100m, memory: 128Mi }
            limits:   { cpu: 500m, memory: 512Mi }
  destination:
    server: https://kubernetes.default.svc
    namespace: logging
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
