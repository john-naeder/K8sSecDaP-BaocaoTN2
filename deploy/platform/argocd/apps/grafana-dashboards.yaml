# grafana-dashboards — zt-soc dashboards as a sidecar-imported ConfigMap.
# Source manifests live in platform/observability/dashboards/ in this repo.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: grafana-dashboards
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:john-naeder/K8sSecDaP-deploy.git
    targetRevision: main
    path: platform/observability/dashboards
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
