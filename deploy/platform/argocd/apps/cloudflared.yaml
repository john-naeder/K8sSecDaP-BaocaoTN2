# Cloudflare Tunnel — outbound tunnel to expose internal services
# (argocd, grafana, harbor, web-console) without opening firewall ports.
# Deployment + ConfigMap shipped from platform/cloudflared/.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: git@github.com:john-naeder/K8sSecDaP-deploy.git
    targetRevision: main
    path: platform/cloudflared
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflare
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
