---
# =============================================================================
# Role: common
# Cấu hình kernel modules, sysctl, tắt swap, kiểm tra AppArmor
# Áp dụng cho TẤT CẢ nodes (master + worker)
# =============================================================================

- name: Load kernel modules ngay lập tức
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  loop:
    - overlay
    - br_netfilter

- name: Persist kernel modules qua reboot
  ansible.builtin.template:
    src: k8s-modules.conf.j2
    dest: /etc/modules-load.d/k8s.conf
    owner: root
    group: root
    mode: "0644"

- name: Cấu hình sysctl cho K8s networking
  ansible.builtin.template:
    src: k8s-sysctl.conf.j2
    dest: /etc/sysctl.d/k8s.conf
    owner: root
    group: root
    mode: "0644"
  notify: Reload sysctl

- name: Apply sysctl ngay
  ansible.builtin.command: sysctl --system
  changed_when: false

- name: Tắt swap ngay lập tức
  ansible.builtin.command: swapoff -a
  changed_when: false

- name: Comment out swap entries trong /etc/fstab
  ansible.builtin.replace:
    path: /etc/fstab
    regexp: '^([^#].*\sswap\s.*)$'
    replace: '# \1'

- name: Verify swap đã tắt
  ansible.builtin.command: swapon --show
  register: swap_status
  changed_when: false

- name: Cảnh báo nếu swap vẫn còn
  ansible.builtin.debug:
    msg: "WARNING: Swap vẫn đang bật. Có thể cần reboot."
  when: swap_status.stdout | length > 0

- name: Kiểm tra AppArmor status
  ansible.builtin.command: aa-status --enabled
  register: apparmor_status
  changed_when: false
  failed_when: false

- name: Thông báo AppArmor status
  ansible.builtin.debug:
    msg: "AppArmor: {{ 'active' if apparmor_status.rc == 0 else 'not active (OK)' }}"
